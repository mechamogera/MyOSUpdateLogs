<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,maximum-scale=2">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>

  <body>
    <div id="header_wrap" class="outer">
        <header class="inner">
          <h1 id="project_title"><a href="/{{ site.title | default: site.github.repository_name }}">{{ site.title | default: site.github.repository_name }}</a></h1>
          <h2 id="project_tagline">{{ site.description | default: site.github.project_tagline }}</h2>
        </header>
    </div>

    <div id="main_content_wrap" class="outer">
      <section id="main_content" class="inner">
        {{ content }}
      </section>
    </div>

    <div id="footer_wrap" class="outer">
      <footer class="inner">
        <p class="copyright">{{ site.title | default: site.github.repository_name }} maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a></p>
        <p>Published with <a href="https://pages.github.com">GitHub Pages</a></p>
      </footer>
    </div>

    <script>
      window.addEventListener('DOMContentLoaded', (event) => {
        // ページ内の太字 (strongタグ) をすべて探す
        const strongTags = document.querySelectorAll('strong');
        strongTags.forEach(tag => {
          // テキストが「You:」で始まっている場合に赤色にする
          if (tag.innerText.trim() === 'You:') {
            tag.style.color = '#ff4c4c'; // スレートテーマに合う少し明るめの赤

            // 2. 「You:」が入っている親要素（段落 p）を探す
            const parentP = tag.closest('p');
            if (parentP) {
              // --- デザインの設定 ---
              parentP.style.backgroundColor = '#f9f9f9'; // 薄いグレーの背景
              parentP.style.padding = '12px 15px';       // 内側に余白を作る
              parentP.style.borderRadius = '8px';       // 角を丸くする
              parentP.style.borderLeft = '5px solid #ff4c4c'; // 左端に赤いアクセント線
              parentP.style.margin = '1.5em 0';         // 前後の間隔を調整
              parentP.style.lineHeight = '1.6';         // 行間を少し広くして読みやすく
              // --------------------
            }
          }
        });
      });
    </script>
  </body>
</html>
